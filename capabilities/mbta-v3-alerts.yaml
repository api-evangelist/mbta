naftiko: 1.0.0-alpha2
info:
  label: MBTA V3 API — Alerts
  description: 'MBTA V3 API — Alerts. 2 operations. Lead operation: List alerts. Self-contained Naftiko capability covering
    one Mbta business surface.'
  tags:
  - Mbta
  - Alerts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MBTA_API_KEY: MBTA_API_KEY
capability:
  consumes:
  - type: http
    namespace: mbta-v3-alerts
    baseUri: https://api-v3.mbta.com
    description: MBTA V3 API — Alerts business capability. Self-contained, no shared references.
    resources:
    - name: alerts
      path: /alerts
      operations:
      - name: listalerts
        method: GET
        description: List alerts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: alerts-id
      path: /alerts/{id}
      operations:
      - name: getalert
        method: GET
        description: Get alert
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.MBTA_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: mbta-v3-alerts-rest
    port: 8080
    description: REST adapter for MBTA V3 API — Alerts. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/alerts
      name: alerts
      description: REST surface for alerts.
      operations:
      - method: GET
        name: listalerts
        description: List alerts
        call: mbta-v3-alerts.listalerts
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/alerts/{id}
      name: alerts-id
      description: REST surface for alerts-id.
      operations:
      - method: GET
        name: getalert
        description: Get alert
        call: mbta-v3-alerts.getalert
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: mbta-v3-alerts-mcp
    port: 9090
    transport: http
    description: MCP adapter for MBTA V3 API — Alerts. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-alerts
      description: List alerts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mbta-v3-alerts.listalerts
      outputParameters:
      - type: object
        mapping: $.
    - name: get-alert
      description: Get alert
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mbta-v3-alerts.getalert
      outputParameters:
      - type: object
        mapping: $.
