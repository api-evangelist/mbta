naftiko: 1.0.0-alpha2
info:
  label: MBTA V3 API — Services
  description: 'MBTA V3 API — Services. 2 operations. Lead operation: List services. Self-contained Naftiko capability covering
    one Mbta business surface.'
  tags:
  - Mbta
  - Services
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MBTA_API_KEY: MBTA_API_KEY
capability:
  consumes:
  - type: http
    namespace: mbta-v3-services
    baseUri: https://api-v3.mbta.com
    description: MBTA V3 API — Services business capability. Self-contained, no shared references.
    resources:
    - name: services
      path: /services
      operations:
      - name: listservices
        method: GET
        description: List services
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: services-id
      path: /services/{id}
      operations:
      - name: getservice
        method: GET
        description: Get service
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.MBTA_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: mbta-v3-services-rest
    port: 8080
    description: REST adapter for MBTA V3 API — Services. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/services
      name: services
      description: REST surface for services.
      operations:
      - method: GET
        name: listservices
        description: List services
        call: mbta-v3-services.listservices
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/services/{id}
      name: services-id
      description: REST surface for services-id.
      operations:
      - method: GET
        name: getservice
        description: Get service
        call: mbta-v3-services.getservice
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: mbta-v3-services-mcp
    port: 9090
    transport: http
    description: MCP adapter for MBTA V3 API — Services. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-services
      description: List services
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mbta-v3-services.listservices
      outputParameters:
      - type: object
        mapping: $.
    - name: get-service
      description: Get service
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mbta-v3-services.getservice
      outputParameters:
      - type: object
        mapping: $.
