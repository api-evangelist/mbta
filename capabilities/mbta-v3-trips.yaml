naftiko: 1.0.0-alpha2
info:
  label: MBTA V3 API — Trips
  description: 'MBTA V3 API — Trips. 2 operations. Lead operation: List trips. Self-contained Naftiko capability covering
    one Mbta business surface.'
  tags:
  - Mbta
  - Trips
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MBTA_API_KEY: MBTA_API_KEY
capability:
  consumes:
  - type: http
    namespace: mbta-v3-trips
    baseUri: https://api-v3.mbta.com
    description: MBTA V3 API — Trips business capability. Self-contained, no shared references.
    resources:
    - name: trips
      path: /trips
      operations:
      - name: listtrips
        method: GET
        description: List trips
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: filter[date]
          in: query
          type: string
        - name: filter[direction_id]
          in: query
          type: integer
        - name: filter[route]
          in: query
          type: string
        - name: filter[route_pattern]
          in: query
          type: string
        - name: filter[name]
          in: query
          type: string
    - name: trips-id
      path: /trips/{id}
      operations:
      - name: gettrip
        method: GET
        description: Get trip
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.MBTA_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: mbta-v3-trips-rest
    port: 8080
    description: REST adapter for MBTA V3 API — Trips. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/trips
      name: trips
      description: REST surface for trips.
      operations:
      - method: GET
        name: listtrips
        description: List trips
        call: mbta-v3-trips.listtrips
        with:
          filter[date]: rest.filter[date]
          filter[direction_id]: rest.filter[direction_id]
          filter[route]: rest.filter[route]
          filter[route_pattern]: rest.filter[route_pattern]
          filter[name]: rest.filter[name]
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/trips/{id}
      name: trips-id
      description: REST surface for trips-id.
      operations:
      - method: GET
        name: gettrip
        description: Get trip
        call: mbta-v3-trips.gettrip
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: mbta-v3-trips-mcp
    port: 9090
    transport: http
    description: MCP adapter for MBTA V3 API — Trips. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-trips
      description: List trips
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mbta-v3-trips.listtrips
      with:
        filter[date]: tools.filter[date]
        filter[direction_id]: tools.filter[direction_id]
        filter[route]: tools.filter[route]
        filter[route_pattern]: tools.filter[route_pattern]
        filter[name]: tools.filter[name]
      outputParameters:
      - type: object
        mapping: $.
    - name: get-trip
      description: Get trip
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mbta-v3-trips.gettrip
      outputParameters:
      - type: object
        mapping: $.
