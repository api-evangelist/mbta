naftiko: 1.0.0-alpha2
info:
  label: MBTA V3 API — Shapes
  description: 'MBTA V3 API — Shapes. 2 operations. Lead operation: List shapes. Self-contained Naftiko capability covering
    one Mbta business surface.'
  tags:
  - Mbta
  - Shapes
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MBTA_API_KEY: MBTA_API_KEY
capability:
  consumes:
  - type: http
    namespace: mbta-v3-shapes
    baseUri: https://api-v3.mbta.com
    description: MBTA V3 API — Shapes business capability. Self-contained, no shared references.
    resources:
    - name: shapes
      path: /shapes
      operations:
      - name: listshapes
        method: GET
        description: List shapes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: filter[route]
          in: query
          type: string
          required: true
    - name: shapes-id
      path: /shapes/{id}
      operations:
      - name: getshape
        method: GET
        description: Get shape
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.MBTA_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: mbta-v3-shapes-rest
    port: 8080
    description: REST adapter for MBTA V3 API — Shapes. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/shapes
      name: shapes
      description: REST surface for shapes.
      operations:
      - method: GET
        name: listshapes
        description: List shapes
        call: mbta-v3-shapes.listshapes
        with:
          filter[route]: rest.filter[route]
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/shapes/{id}
      name: shapes-id
      description: REST surface for shapes-id.
      operations:
      - method: GET
        name: getshape
        description: Get shape
        call: mbta-v3-shapes.getshape
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: mbta-v3-shapes-mcp
    port: 9090
    transport: http
    description: MCP adapter for MBTA V3 API — Shapes. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-shapes
      description: List shapes
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mbta-v3-shapes.listshapes
      with:
        filter[route]: tools.filter[route]
      outputParameters:
      - type: object
        mapping: $.
    - name: get-shape
      description: Get shape
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mbta-v3-shapes.getshape
      outputParameters:
      - type: object
        mapping: $.
