naftiko: 1.0.0-alpha2
info:
  label: MBTA V3 API — Facilities
  description: 'MBTA V3 API — Facilities. 2 operations. Lead operation: List facilities. Self-contained Naftiko capability
    covering one Mbta business surface.'
  tags:
  - Mbta
  - Facilities
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MBTA_API_KEY: MBTA_API_KEY
capability:
  consumes:
  - type: http
    namespace: mbta-v3-facilities
    baseUri: https://api-v3.mbta.com
    description: MBTA V3 API — Facilities business capability. Self-contained, no shared references.
    resources:
    - name: facilities
      path: /facilities
      operations:
      - name: listfacilities
        method: GET
        description: List facilities
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: facilities-id
      path: /facilities/{id}
      operations:
      - name: getfacility
        method: GET
        description: Get facility
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.MBTA_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: mbta-v3-facilities-rest
    port: 8080
    description: REST adapter for MBTA V3 API — Facilities. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/facilities
      name: facilities
      description: REST surface for facilities.
      operations:
      - method: GET
        name: listfacilities
        description: List facilities
        call: mbta-v3-facilities.listfacilities
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/facilities/{id}
      name: facilities-id
      description: REST surface for facilities-id.
      operations:
      - method: GET
        name: getfacility
        description: Get facility
        call: mbta-v3-facilities.getfacility
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: mbta-v3-facilities-mcp
    port: 9090
    transport: http
    description: MCP adapter for MBTA V3 API — Facilities. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-facilities
      description: List facilities
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mbta-v3-facilities.listfacilities
      outputParameters:
      - type: object
        mapping: $.
    - name: get-facility
      description: Get facility
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mbta-v3-facilities.getfacility
      outputParameters:
      - type: object
        mapping: $.
