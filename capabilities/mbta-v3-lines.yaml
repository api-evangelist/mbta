naftiko: 1.0.0-alpha2
info:
  label: MBTA V3 API — Lines
  description: 'MBTA V3 API — Lines. 2 operations. Lead operation: List lines. Self-contained Naftiko capability covering
    one Mbta business surface.'
  tags:
  - Mbta
  - Lines
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MBTA_API_KEY: MBTA_API_KEY
capability:
  consumes:
  - type: http
    namespace: mbta-v3-lines
    baseUri: https://api-v3.mbta.com
    description: MBTA V3 API — Lines business capability. Self-contained, no shared references.
    resources:
    - name: lines
      path: /lines
      operations:
      - name: listlines
        method: GET
        description: List lines
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: lines-id
      path: /lines/{id}
      operations:
      - name: getline
        method: GET
        description: Get line
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: x-api-key
      value: '{{env.MBTA_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: mbta-v3-lines-rest
    port: 8080
    description: REST adapter for MBTA V3 API — Lines. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/lines
      name: lines
      description: REST surface for lines.
      operations:
      - method: GET
        name: listlines
        description: List lines
        call: mbta-v3-lines.listlines
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/lines/{id}
      name: lines-id
      description: REST surface for lines-id.
      operations:
      - method: GET
        name: getline
        description: Get line
        call: mbta-v3-lines.getline
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: mbta-v3-lines-mcp
    port: 9090
    transport: http
    description: MCP adapter for MBTA V3 API — Lines. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-lines
      description: List lines
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mbta-v3-lines.listlines
      outputParameters:
      - type: object
        mapping: $.
    - name: get-line
      description: Get line
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mbta-v3-lines.getline
      outputParameters:
      - type: object
        mapping: $.
